<svg xmlns="http://www.w3.org/2000/svg" width="970" height="250" viewBox="0 0 970 250" role="img" aria-labelledby="title desc">
  <title id="title">광고 예시 이미지</title>
  <desc id="desc">블로그 광고 위치를 보여주기 위한 예시 배너입니다.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eef2ff"/>
      <stop offset="48%" stop-color="#e0f2fe"/>
      <stop offset="100%" stop-color="#dcfce7"/>
    </linearGradient>
    <linearGradient id="button" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.16"/>
    </filter>
  </defs>
  <rect width="970" height="250" rx="28" fill="url(#bg)"/>
  <rect x="22" y="22" width="926" height="206" rx="24" fill="white" opacity="0.72" stroke="#cbd5e1" stroke-dasharray="10 10"/>
  <g transform="translate(70 54)">
    <rect width="104" height="104" rx="26" fill="#4f46e5" opacity="0.12"/>
    <path d="M31 72h43M31 52h43M31 32h43" stroke="#4f46e5" stroke-width="8" stroke-linecap="round"/>
    <circle cx="78" cy="78" r="16" fill="#0ea5e9" opacity="0.9"/>
  </g>
  <g transform="translate(215 55)">
    <text x="0" y="0" fill="#64748b" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="18" font-weight="800" letter-spacing="3">AD PREVIEW</text>
    <text x="0" y="47" fill="#0f172a" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="38" font-weight="900">여기에 광고가 표시됩니다</text>
    <text x="0" y="86" fill="#475569" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="20" font-weight="600">AdSense 승인 후 실제 광고 배너로 자동 교체되는 자리입니다.</text>
    <rect x="0" y="115" width="176" height="42" rx="21" fill="url(#button)" filter="url(#shadow)"/>
    <text x="88" y="142" text-anchor="middle" fill="white" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="16" font-weight="900">광고 예시</text>
  </g>
  <g opacity="0.42">
    <circle cx="865" cy="72" r="28" fill="#4f46e5"/>
    <circle cx="900" cy="102" r="17" fill="#0ea5e9"/>
    <circle cx="842" cy="139" r="13" fill="#10b981"/>
  </g>
</svg>
